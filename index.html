<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8fd24f">
<title>BRAINROT SURVIVORS — Italian Brainrot Bullet Hell</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" class="hidden">
  <div class="bar"><div id="hpfill"></div></div>
  <div class="bar"><div id="xpfill"></div></div>
  <div id="hudrow">
    <span id="wavetag">WAVE 1</span>
    <span id="leveltag">LV 1</span>
    <span id="scoretag">★ 0</span>
  </div>
</div>
<div id="combotag"></div>
<div id="bosswarn" class="hidden">⚠ BOSS ⚠</div>
<div id="dashbtn" class="hidden">DASH</div>
<div id="zoomctl" class="hidden">
  <button id="zoomin" type="button">+</button>
  <button id="zoomout" type="button">&minus;</button>
</div>

<div id="menu" class="overlay">
  <div class="panel">
    <div class="title">BRAINROT<br>SURVIVORS</div>
    <div class="subtitle">italian brainrot bullet hell</div>
    <button class="bigbtn green" id="startbtn">PLAY</button>
    <div class="hint">drag anywhere to move • auto-fire<br>collect crystals → pick upgrades<br>tap DASH to dodge • explore the field</div>
  </div>
</div>

<div id="levelup" class="overlay hidden">
  <div class="panel">
    <h2>LEVEL UP!</h2>
    <div class="cards" id="cards"></div>
  </div>
</div>

<div id="gameover" class="overlay hidden">
  <div class="panel">
    <div class="title" style="color:#4aa3df">GAME<br>OVER</div>
    <div class="stats">
      reached <b id="fwave">wave 1</b><br>
      score <b id="fscore">0</b><br>
      enemies cleared <b id="fkills">0</b><br>
      best <b id="fbest">0</b>
    </div>
    <button class="bigbtn green" id="retrybtn">PLAY AGAIN</button>
  </div>
</div>

<!-- Game scripts: classic (non-module) so they share globals and run from file:// too.
     Load order matters: core defines shared helpers/state used by the rest. -->
<script src="js/core.js"></script>
<script src="js/audio.js"></script>
<script src="js/sprites.js"></script>
<script src="js/input.js"></script>
<script src="js/game.js"></script>
</body>
</html>

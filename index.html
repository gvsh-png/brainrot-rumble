<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8fd24f">
<title>BRAINROT RUMBLE — Italian Invasion</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="game"></canvas>

<div id="loading" class="overlay">
  <div class="loadwrap">
    <div class="title">BRAINROT<br>RUMBLE</div>
    <div class="loadspin"></div>
    <div class="loadtxt">loading the invasion…</div>
  </div>
</div>

<div id="hud" class="hidden">
  <button id="pausebtn" type="button" aria-label="Pause">II</button>
  <div id="hudtop">
    <div id="timeblock">
      <div id="timetag">00:00</div>
      <div id="wavetag">WAVE 1</div>
    </div>
    <div id="hudstats">
      <span id="coincount" class="hudpill"><img draggable="false" alt=""><span>0</span></span>
      <span id="killtag" class="hudpill"><img class="kico" data-ic="ic_skull" alt=""><span>0</span></span>
    </div>
  </div>
  <div id="xprow">
    <div class="xpbar"><div id="xpfill"></div></div>
    <div id="lvbadge">1</div>
  </div>
  <div id="bossbar" class="hidden">
    <div id="bossname">BOSS</div>
    <div class="bar"><div id="bossfill"></div></div>
    <div class="bar bar2 hidden" id="bossbar2"><div id="bossfill2"></div></div>
  </div>
</div>
<div id="bosswarn" class="hidden">⚠ BOSS ⚠</div>
<div id="dashbtn" class="hidden">DASH</div>
<div id="zoomctl" class="hidden">
  <button id="zoomin" type="button">+</button>
  <button id="zoomout" type="button">&minus;</button>
</div>

<div id="menu" class="overlay" data-tab="battle">
  <!-- TOP RESOURCE BAR -->
  <div id="topbar">
    <div id="topbadge"><span id="topLvl">1</span></div>
    <div id="topxp"><div id="topxpfill"></div></div>
    <div class="respill"><img id="goldicon" draggable="false" alt=""><span id="goldtxt">0</span><b class="resplus">+</b></div>
    <button id="mutebtn" class="iconbtn" type="button"><img id="muteic" alt=""></button>
  </div>

  <div id="tabview">
    <!-- BATTLE -->
    <div id="tab-battle" class="tabpanel">
      <div id="worldsel">
        <button id="wprev" type="button" aria-label="Previous world">◀</button>
        <span id="wname">WORLD 1 · GRASSLANDS</span>
        <button id="wnext" type="button" aria-label="Next world">▶</button>
      </div>
      <div class="worldsub">the italian invasion</div>
      <div id="stage">
        <div id="charplat"></div>
        <img id="charimg" draggable="false" alt="">
      </div>
      <div id="menubot">
        <button class="startbtn" id="startbtn"><span class="startlbl">START</span></button>
        <div class="hint">drag to move • auto-fire • survive the waves</div>
      </div>
    </div>

    <!-- SHOP -->
    <div id="tab-shop" class="tabpanel hidden">
      <div id="shopgrid"></div>
    </div>

    <!-- EQUIPMENT -->
    <div id="tab-inventory" class="tabpanel hidden">
      <div id="eqstage"></div>
      <div class="banner"><span>MY EQUIPMENT</span></div>
      <div id="eqcontrols"></div>
      <div id="invowned" class="ggrid"></div>
    </div>
  </div>

  <!-- BOTTOM TAB BAR (connected, raised center) -->
  <div id="tabbar">
    <button class="tabbtn" type="button" data-tab="shop"><img class="tabico" data-ic="ic_shop" alt=""><span class="tablbl">Shop</span><span class="tabbadge hidden" id="shopbadge">!</span></button>
    <button class="tabbtn center active" type="button" data-tab="battle"><img class="tabico" data-ic="ic_battle" alt=""><span class="tablbl">Battle</span></button>
    <button class="tabbtn" type="button" data-tab="inventory"><img class="tabico" data-ic="ic_bag" alt=""><span class="tablbl">Bag</span><span class="tabbadge hidden" id="invbadge">0</span></button>
  </div>
</div>

<div id="crate" class="overlay hidden">
  <div class="panel cratepanel">
    <h2 class="ptitle">OPENING…</h2>
    <div id="crview" class="crview"><div class="crmarker"></div><div id="crstrip" class="crstrip"></div></div>
    <div id="crresult" class="crresult hidden"></div>
    <button class="bigbtn green hidden" id="crclaim">CLAIM</button>
  </div>
</div>

<div id="itempop" class="overlay hidden"></div>

<div id="levelup" class="overlay hidden">
  <div class="panel lvpanel">
    <h2 class="skillbanner">SKILL CHOICE</h2>
    <div id="skillstrip"></div>
    <div class="cards" id="cards"></div>
    <div class="lvhint">Select a skill to learn</div>
  </div>
</div>

<div id="gameover" class="overlay hidden">
  <div class="panel">
    <div class="title" style="color:#4aa3df">GAME<br>OVER</div>
    <div class="stats">
      reached <b id="fwave">wave 1</b><br>
      coins collected <b id="fcoins">0</b><br>
      enemies cleared <b id="fkills">0</b>
    </div>
    <button class="bigbtn green" id="retrybtn">PLAY AGAIN</button>
  </div>
</div>

<div id="pause" class="overlay hidden">
  <div class="panel">
    <h2 class="ptitle">PAUSED</h2>
    <button class="bigbtn green" id="resumebtn">RESUME</button>
    <button class="bigbtn" id="pausemute">Music</button>
    <button class="bigbtn quit" id="quitbtn">Quit to Menu</button>
  </div>
</div>

<!-- Game scripts: classic (non-module) so they share globals and run from file:// too.
     Load order matters: core defines shared helpers/state used by the rest. -->
<script src="js/core.js"></script>
<script src="js/audio.js"></script>
<script src="js/sprites.js"></script>
<script src="js/input.js"></script>
<script src="js/game.js"></script>
<script src="js/shop.js"></script>
</body>
</html>

# Builds a debug APK you can install on your phone without publishing to Play Store.
# Download: GitHub → Actions → latest run → Artifacts → brainrot-swarm-debug-apk
name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'cursor/**'
    paths:
      - '.github/workflows/android-debug-apk.yml'
      - 'android/**'
      - 'capacitor.config.json'
      - 'index.html'
      - 'styles.css'
      - 'js/**'
      - 'icons/**'
      - 'manifest.webmanifest'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'

permissions:
  contents: read

concurrency:
  group: android-debug-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor web assets to Android
        run: npm run cap:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: brainrot-swarm-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
